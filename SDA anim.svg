<svg viewBox="0 0 300 80" width="300" height="80"
     xmlns="http://www.w3.org/2000/svg">

  <style>
    /* Общие настройки */
    .stick {
      fill: none;
      stroke: #000;
      stroke-width: 6;
      stroke-linecap: round;
      transform-box: fill-box;
      transform-origin: center;
    }

    .label {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 18px;
      opacity: 0;
    }

    /* Фаза 1 — «раскладываем» буквы в прямые палки */
    #s_stick {
      animation: sToLine 0.7s ease-in-out forwards;
      animation-delay: 0.1s;
    }
    #d_stick {
      animation: dToLine 0.7s ease-in-out forwards;
      animation-delay: 0.2s;
    }
    #a_stick {
      animation: aToLine 0.7s ease-in-out forwards;
      animation-delay: 0.3s;
    }

    /* Фаза 2 — сводим три палки в одну, влево */
    .stick {
      animation-name: moveToLeft;
      animation-duration: 0.6s;
      animation-delay: 0.9s;
      animation-fill-mode: forwards;
      /* суммарная анимация: сначала «раскладывание» (индивидуальный keyframe),
         затем общее движение влево */
    }

    /* Фаза 3 — появление расшифровки из палки */
    #fullLabel {
      animation: labelIn 0.6s ease-out forwards;
      animation-delay: 1.4s;
    }

    /* --- KEYFRAMES --- */

    /* Превращаем условные «ломаные буквы» в горизонтальные палки */
    @keyframes sToLine {
      from { d: path("M40 55 L30 35 L50 25"); }
      to   { d: path("M40 40 L80 40"); }
    }

    @keyframes dToLine {
      from { d: path("M120 55 L120 25 L140 35"); }
      to   { d: path("M120 40 L160 40"); }
    }

    @keyframes aToLine {
      from { d: path("M200 55 L190 25 L210 25 L200 40"); }
      to   { d: path("M200 40 L240 40"); }
    }

    /* Общее движение линий влево и наложение друг на друга */
    @keyframes moveToLeft {
      from { transform: translateX(0px); }
      to   { transform: translateX(-80px); }
    }

    /* Расшифровка «выезжает» из палки */
    @keyframes labelIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0px);
      }
    }
  </style>

  <!-- Согнутые палки, образующие SDA (условная геометрия, подстрой под свой логотип) -->
  <path id="s_stick" class="stick"
        d="M40 55 L30 35 L50 25" />

  <path id="d_stick" class="stick"
        d="M120 55 L120 25 L140 35" />

  <path id="a_stick" class="stick"
        d="M200 55 L190 25 L210 25 L200 40" />

  <!-- Расшифровка, которая «складывается» в линию -->
  <text id="fullLabel" class="label" x="80" y="45">
    Studio of Digital Architecture
  </text>
</svg>
