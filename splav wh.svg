<?xml version="1.0" encoding="utf-8"?>
<svg width="657" height="253" viewBox="0 0 657 253" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petalBlue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B49E8"/>
      <stop offset="100%" stop-color="#0B00C4"/>
    </linearGradient>
    <linearGradient id="petalBlue2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4B49E8"/>
      <stop offset="100%" stop-color="#0B00C4"/>
    </linearGradient>
  </defs>

  <rect width="657" height="253" fill="#EEF0F5"/>

  <!-- Logo mark -->
  <g transform="translate(40,26)">
    <!-- Top-right petal -->
    <path d="M100,100
             C100,55 130,15 178,10
             C182,58 145,95 100,100
             Z"
          fill="url(#petalBlue1)"/>
    <!-- Bottom-left petal -->
    <path d="M100,100
             C100,145 70,185 22,190
             C18,142 55,105 100,100
             Z"
          fill="url(#petalBlue2)"/>
    <!-- Registered trademark -->
    <circle cx="196" cy="112" r="9" fill="none" stroke="#111111" stroke-width="1.4"/>
    <text x="196" y="116" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#111111" text-anchor="middle">R</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(232,0)">
    <text x="0" y="120" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="800" letter-spacing="2" fill="#111111">VTA</text>
    <text x="4" y="185" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" letter-spacing="1" fill="#111111">Engineering</text>
  </g>
</svg>
